<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Editar Cliente - Meu Negócio Hinode</title>

    <link
        rel="stylesheet"
        href="css/editar-cliente.css"
    >
</head>

<body>

<main class="container">

    <header class="topo">

        <h1>Meu Negócio Hinode</h1>

        <a
            href="pesquisar-clientes.html"
            class="voltar"
        >
            Voltar aos Clientes
        </a>

    </header>

    <section class="card">

        <h2>EDITAR CLIENTE</h2>

        <input
            type="hidden"
            id="cliente-id"
        >

        <label>Nome *</label>

        <input
            type="text"
            id="nome"
            placeholder="Nome completo"
        >

        <label>Contato / WhatsApp</label>

        <input
            type="text"
            id="contato"
            placeholder="Ex: (67) 99999-9999"
        >

        <label>RG</label>

        <input
            type="text"
            id="rg"
            placeholder="RG"
        >

        <label>CPF</label>

        <input
            type="text"
            id="cpf"
            placeholder="CPF"
        >

        <label>Data de nascimento</label>

        <input
            type="date"
            id="data-nascimento"
        >

        <label>Rua</label>

        <input
            type="text"
            id="rua"
            placeholder="Nome da rua"
        >

        <label>Número</label>

        <input
            type="text"
            id="numero"
            placeholder="Número"
        >

        <label>Bairro</label>

        <input
            type="text"
            id="bairro"
            placeholder="Bairro"
        >

        <label>Cidade</label>

        <input
            type="text"
            id="cidade"
            placeholder="Cidade"
        >

        <label>Referência</label>

        <input
            type="text"
            id="referencia"
            placeholder="Ponto de referência"
        >

        <label>Indicação</label>

        <input
            type="text"
            id="indicacao"
            placeholder="Quem indicou"
        >

        <div class="acoes">

            <button onclick="salvarAlteracoes()">
                Salvar Alterações
            </button>

            <a
                href="pesquisar-clientes.html"
                class="botao-cancelar"
            >
                Cancelar
            </a>

        </div>

    </section>

</main>

<script src="js/editar-cliente.js"></script>

</body>
</html>
