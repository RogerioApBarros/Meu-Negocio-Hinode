<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Produtos - Meu Negócio Hinode</title>
    <link rel="stylesheet" href="css/produtos.css">
</head>
<body>

<main class="container">

    <header class="topo">

        <h1>Meu Negócio Hinode</h1>

        <div class="acoes-topo">

            <a href="pesquisar-produtos.html" class="botao-pesquisar">
                Pesquisar Produtos
            </a>

            <a href="index.html" class="voltar">
                Voltar ao Menu
            </a>

        </div>

    </header>

    <section class="card">

        <h2>CADASTRO DE PRODUTOS</h2>

        <div class="formulario">

            <label>Nome do produto *</label>
            <input type="text" id="nome-produto" placeholder="Ex: Empire">

            <label>Marca *</label>
            <input type="text" id="marca" placeholder="Ex: Hinode">

            <label>Custo *</label>
            <input type="number" id="custo" placeholder="Ex: 100" step="0.01">

            <label>Valor de venda *</label>
            <input type="number" id="valor-venda" placeholder="Ex: 230" step="0.01">

            <label>Impostos *</label>
            <input type="number" id="impostos" placeholder="Ex: 0" step="0.01">

            <label>Quantidade *</label>
            <input type="number" id="quantidade" placeholder="Ex: 5" min="0">

            <button onclick="cadastrarProduto()">
                Cadastrar Produto
            </button>

        </div>

        <div class="resultados">

            <div class="resultado">
                <span>Margem lucro bruto</span>
                <strong id="margem-bruta">0%</strong>
            </div>

            <div class="resultado">
                <span>Margem lucro líquido</span>
                <strong id="margem-liquida">0%</strong>
            </div>

        </div>

    </section>

</main>

<script src="js/produtos.js"></script>

</body>
</html>
