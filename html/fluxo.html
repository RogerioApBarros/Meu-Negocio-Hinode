<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Fluxo Financeiro</title>
    <link rel="stylesheet" href="css/fluxo.css">
</head>
<body>

<main class="container">

    <header class="topo">
        <h1>Meu Negócio Hinode</h1>
        <a href="index.html" class="voltar">Voltar ao Menu</a>
    </header>

    <section class="card">

        <h2>FLUXO FINANCEIRO</h2>

        <div class="dashboard">

            <div class="resultado">
                <span>Total vendido</span>
                <strong id="total-vendido">R$ 0,00</strong>
            </div>

            <div class="resultado">
                <span>Total recebido</span>
                <strong id="total-recebido">R$ 0,00</strong>
            </div>

            <div class="resultado">
                <span>Total em aberto</span>
                <strong id="total-aberto">R$ 0,00</strong>
            </div>

            <div class="resultado">
                <span>Total vencido</span>
                <strong id="total-vencido">R$ 0,00</strong>
            </div>

            <div class="resultado">
                <span>Estoque em custo</span>
                <strong id="estoque-custo">R$ 0,00</strong>
            </div>

            <div class="resultado">
                <span>Estoque em venda</span>
                <strong id="estoque-venda">R$ 0,00</strong>
            </div>

            <div class="resultado destaque">
                <span>Lucro bruto previsto</span>
                <strong id="lucro-previsto">R$ 0,00</strong>
            </div>

        </div>

    </section>

</main>

<script src="js/fluxo.js"></script>

</body>
</html>
