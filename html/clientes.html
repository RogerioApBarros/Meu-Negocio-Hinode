<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Clientes - Meu Negócio Hinode</title>
    <link rel="stylesheet" href="css/clientes.css">
</head>
<body>

<main class="container">

    <header class="topo">
        <h1>Meu Negócio Hinode</h1>

        <div class="acoes-topo">
            <a href="pesquisar-clientes.html" class="botao-pesquisar">
                Pesquisar Clientes
            </a>

            <a href="index.html" class="voltar">
                Voltar ao Menu
            </a>
        </div>
    </header>

    <section class="card">

        <h2>CADASTRO DE CLIENTES</h2>

        <div class="formulario">

            <label>Nome *</label>
            <input type="text" id="nome" placeholder="Nome completo">

            <label>Contato / WhatsApp</label>
            <input type="text" id="contato" placeholder="Ex: (67) 99999-9999">

            <label>RG</label>
            <input type="text" id="rg" placeholder="RG">

            <label>CPF</label>
            <input type="text" id="cpf" placeholder="CPF">

            <label>Data de nascimento</label>
            <input type="date" id="data-nascimento">

            <label>Rua</label>
            <input type="text" id="rua" placeholder="Nome da rua">

            <label>Número</label>
            <input type="text" id="numero" placeholder="Número">

            <label>Bairro</label>
            <input type="text" id="bairro" placeholder="Bairro">

            <label>Cidade</label>
            <input type="text" id="cidade" placeholder="Cidade">

            <label>Referência</label>
            <input type="text" id="referencia" placeholder="Ponto de referência">

            <label>Indicação</label>
            <input type="text" id="indicacao" placeholder="Quem indicou">

            <button
    type="button"
    id="btnCadastrarCliente"
    class="botao-cadastrar"
    onclick="cadastrarCliente()"
>
    Cadastrar
</button>

        </div>

    </section>

</main>

<script src="js/services/api.js"></script>
<script src="js/services/auth.js"></script>
<script src="js/clientes.js"></script>

</body>
</html>
